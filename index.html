<html lang="tr">
<head>
<meta charset="UTF-8">

<title>Damat Halayi 💍</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; user-select:none; -webkit-user-select:none; }

body {
  background: linear-gradient(180deg, #0d0221 0%, #2a0a4a 50%, #4a1070 100%);
  height: 100dvh; width: 100vw; overflow: hidden; position: relative;
}

/* Stars */
.star {
  position: absolute; background: white; border-radius: 50%;
  animation: twinkle var(--d) ease-in-out infinite alternate;
}
@keyframes twinkle { from{opacity:.1} to{opacity:.85} }

/* Ground */
#ground {
  position: absolute; bottom: 0; left: 0; right: 0; height: 30%;
  background: linear-gradient(180deg, #4a1070 0%, #2a0550 60%, #150228 100%);
  border-top: 3px solid rgba(251,191,36,.6);
}
#ground::before {
  content:''; position:absolute; top:0; left:0; right:0; height:5px;
  background: repeating-linear-gradient(90deg, #fbbf24 0, #fbbf24 6px, transparent 6px, transparent 12px);
}

/* Title */
.title {
  position: absolute; top: 14px; width: 100%; text-align: center;
  font-size: clamp(16px,4.5vw,30px); color: #fbbf24;
  font-family: Georgia, serif; font-style: italic; letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(251,191,36,.8), 0 2px 4px #000;
  pointer-events: none; z-index: 10;
}

/* The dancing floor — clips the characters */
#stage {
  position: absolute;
  left: 0; right: 0;
  bottom: 28%;
  height: 210px;
  overflow: hidden;
}

/* Each person wrapper — positioned absolutely inside #stage */
.person {
  position: absolute;
  bottom: 0;
  width: 54px;
  animation: bounce var(--bd, .48s) ease-in-out infinite alternate;
  transform-origin: bottom center;
  will-change: transform;
}
@keyframes bounce {
  from { transform: translateY(0px) rotate(-2.5deg); }
  to   { transform: translateY(-10px) rotate(2.5deg); }
}

/* Handkerchief ribbon between people */
.ribbon {
  position: absolute;
  bottom: 108px;
  height: 5px;
  background: linear-gradient(90deg, rgba(251,191,36,0), rgba(251,191,36,.85), rgba(251,191,36,0));
  border-radius: 3px;
  pointer-events: none;
  will-change: transform;
}

/* Hint */
.hint {
  position: absolute; bottom: 12px; width: 100%; text-align: center;
  color: rgba(251,191,36,.75); font-size: 13px; font-family: Georgia,serif;
  pointer-events: none; z-index: 10;
  animation: pulse 1.9s ease-in-out infinite;
  transition: opacity .5s;
}
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

.drag-arrow {
  position: absolute; bottom: 33%; left: 50%; transform: translateX(-50%);
  font-size: 30px; color: rgba(251,191,36,.9);
  pointer-events: none; z-index: 10;
  animation: ab .75s ease-in-out infinite alternate;
  transition: opacity .5s;
}
@keyframes ab { from{transform:translateX(calc(-50% - 12px))} to{transform:translateX(calc(-50% + 12px))} }

/* Audio pill */
.audio-pill {
  position: absolute; top: 56px; right: 12px;
  background: rgba(0,0,0,.5); border: 1px solid rgba(251,191,36,.4);
  color: rgba(251,191,36,.85); font-size: 11px; font-family: Georgia,serif;
  padding: 3px 9px; border-radius: 20px;
  pointer-events: none; z-index: 10; opacity: 0; transition: opacity .4s;
}
.audio-pill.show { opacity: 1; }

/* Confetti */
.conf {
  position: fixed; pointer-events: none; border-radius: 2px;
  animation: cfall linear forwards; z-index: 30;
}
@keyframes cfall {
  0%   { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(88vh) rotate(540deg); opacity:0; }
}
/* Music note */
.mnote {
  position: fixed; pointer-events: none; font-size: 17px; color: #fbbf24;
  animation: nf 1.6s ease-out forwards; z-index: 30;
}
@keyframes nf {
  0%   { transform: translateY(0) scale(1); opacity:1; }
  100% { transform: translateY(-65px) scale(1.3); opacity:0; }
}
</style>
</head>

// Order: bride leads (rightmost/first), followed by groom, then guests stretching LEFT.
// Position 0 = bride (leader). Position 1 = groom. 2+ = guests.
// They all move RIGHT. Bride exits right screen, wraps around to re-enter from left.
//
// Each person has a slot index [0..N-1]. We keep a circular queue.
// The visual x position of slot i = baseX + i * SPACING
// baseX scrolls rightward as user drags.

const SPACING = 68;       // px between people
const N = 12;             // number of people in the circle
const GUEST_TYPES = ['gw1','gm1','gw2','gm1','elder','gw1','gm1','gw2'];

// Build the circular order: [bride, groom, guest, guest, ...]
const ORDER = ['bride', 'groom', ...GUEST_TYPES];  // length = 10, cycle for N=12
function getType(slotIndex) {
  return ORDER[slotIndex % ORDER.length];
}

const stage = document.getElementById('stage');
const VW = window.innerWidth;
const VH = parseInt(getComputedStyle(stage).height);

// People objects: { el, ribbonEl, slot }
// slot: which position in the procession this person currently represents
const people = [];

// baseX: x position of slot 0 (bride) in viewport coords
// Starts: bride at x = 0 (left edge of screen). Others trail to the left.
// slot i has viewport x = baseX - i * SPACING  (bride is rightmost = highest x = LEADS)
// Wait — bride LEADS from the left moving right. She is the FRONT of the line.
// Moving right means increasing x. Bride is the front → she has the highest x position.
// Guests trail behind → lower x positions (to her left).
// So: slot 0 (bride) at baseX, slot 1 (groom) at baseX - SPACING, slot 2 at baseX - 2*SPACING...
// Start: bride at left edge → baseX = 0. Groom at -SPACING (off screen). They march right.
// As baseX increases, everyone moves right. Bride exits at VW. She wraps to baseX - N*SPACING.

let baseX = 0;            // viewport x of the bride (slot 0)
let isDragging = false, dragStartCX = 0, dragStartBase = 0;
let velocity = 0, lastCX = 0, lastT = 0;
let hasInteracted = false;
let autoScroll = false;   // auto-scroll when not dragging

// Create all people + ribbons
for (let i = 0; i < N; i++) {
  const type = getType(i);

  const div = document.createElement('div');
  div.className = 'person';
  div.style.setProperty('--bd', (0.42 + Math.random() * 0.18) + 's');
  div.style.animationDelay = (i * 0.06) + 's';
  div.innerHTML = SVG[type] || SVG.gm1;
  stage.appendChild(div);

  // Ribbon between person i and i+1 (i+1 is behind = to the left)
  let ribbonEl = null;
  if (i < N - 1) {
    ribbonEl = document.createElement('div');
    ribbonEl.className = 'ribbon';
    stage.appendChild(ribbonEl);
  }

  people.push({ el: div, ribbonEl, slot: i, type });
}

function positionAll() {
  for (let i = 0; i < N; i++) {
    const { el, ribbonEl } = people[i];
    // slot i viewport x: bride (slot0) at baseX, each subsequent person SPACING px to the left
    let x = baseX - i * SPACING;
    el.style.left = x + 'px';

    if (ribbonEl) {
      // Ribbon starts at right edge of person i+1 (x - SPACING + 54) and ends at left edge of person i (x)
      const rx = x - SPACING + 54;
      ribbonEl.style.left = rx + 'px';
      ribbonEl.style.width = (SPACING - 54 + 14) + 'px'; // gap between them
    }
  }
}

// ── CIRCULAR WRAP ─────────────────────────────────────────────────────────────
// When baseX advances too far right: bride (slot 0) exits screen right.
// We don't move slots — instead we let baseX grow freely and each person's x = baseX - slot*SPACING.
// For the loop: when the bride (slot 0) exits right (x > VW + 100), we want her to loop back.
// Strategy: keep a cyclic offset. Once baseX - 0*SPACING > VW + 100, subtract N*SPACING from baseX
// so the brigade shifts back N positions but looks the same (the last person was just off-screen left).
// This creates the illusion of an infinite circle.

const TOTAL_SPAN = N * SPACING;  // total width of the procession

function wrapIfNeeded() {
  // If bride has gone too far right, loop the whole group
  if (baseX > VW + 150) {
    baseX -= TOTAL_SPAN;
    dragStartBase -= TOTAL_SPAN; // keep drag anchor consistent
  }
  // If dragged too far left (everyone off-screen right), loop forward
  if (baseX < -(TOTAL_SPAN - VW) - 150) {
    baseX += TOTAL_SPAN;
    dragStartBase += TOTAL_SPAN;
  }
}

// ── AUTO SCROLL ───────────────────────────────────────────────────────────────
// Gentle auto-scroll so the procession keeps moving even without input
let autoBaseX = baseX;
const AUTO_SPEED = 0.6; // px per frame

// ── RENDER ────────────────────────────────────────────────────────────────────
let lastExitX = -9999;
function render() {
  requestAnimationFrame(render);

  if (!isDragging) {
    if (Math.abs(velocity) > 0.3) {
      baseX += velocity;
      velocity *= 0.93;
    } else {
      velocity = 0;
      // gentle auto scroll
      baseX += AUTO_SPEED;
    }
    wrapIfNeeded();
  }

  positionAll();

  // Confetti when bride crosses right edge
  const brideX = baseX;
  if (brideX > VW + 10 && lastExitX < VW + 10) {
    spawnConfetti(VW - 10, stage.getBoundingClientRect().top + 80);
  }
  lastExitX = brideX;
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function onStart(cx) {
  isDragging = true;
  dragStartCX = cx;
  dragStartBase = baseX;
  velocity = 0;
  lastCX = cx;
  lastT = Date.now();
  startAudio();
  if (!hasInteracted) {
    hasInteracted = true;
    document.getElementById('dragArrow').style.opacity = '0';
    document.getElementById('hint').style.opacity = '0';
  }
}
function onMove(cx) {
  if (!isDragging) return;
  const dx = cx - dragStartCX;
  baseX = dragStartBase + dx;
  wrapIfNeeded();
  const now = Date.now(), dt = now - lastT;
  if (dt > 8) { velocity = (cx - lastCX) / dt * 16; lastCX = cx; lastT = now; }
  if (Math.abs(velocity) > 2) maybeNote();
}
function onEnd() { isDragging = false; stopAudio(); }

document.addEventListener('touchstart', e => onStart(e.touches[0].clientX), {passive:true});
document.addEventListener('touchmove',  e => onMove(e.touches[0].clientX),  {passive:true});
document.addEventListener('touchend',   onEnd);
document.addEventListener('mousedown',  e => onStart(e.clientX));
document.addEventListener('mousemove',  e => onMove(e.clientX));
document.addEventListener('mouseup',    onEnd);
document.addEventListener('mouseleave', onEnd);

// ── AUDIO ─────────────────────────────────────────────────────────────────────
const audioPill = document.getElementById('audioPill');
let synth=null, part=null, audioReady=false, audioPlaying=false;

function b64ToAB(b64) {
  const bin = atob(b64.replace(/\s/g,''));
  const buf = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
  return buf.buffer;
}
function readVL(d, p) {
  let v=0,b; do{b=d[p++];v=(v<<7)|(b&0x7f);}while(b&0x80); return{v,p};
}
function parseMIDI(buf) {
  const d=new Uint8Array(buf); let p=0;
  const r32=()=>{const v=(d[p]<<24)|(d[p+1]<<16)|(d[p+2]<<8)|d[p+3];p+=4;return v;};
  const r16=()=>{const v=(d[p]<<8)|d[p+1];p+=2;return v;};
  p+=4;r32();r16();
  const nt=r16(),tpb=r16();
  let tempo=500000; const notes=[];
  for(let t=0;t<nt;t++){
    p+=4;const tlen=r32(),tend=p+tlen;
    let tick=0,ls=0;
    while(p<tend){
      const dtr=readVL(d,p);p=dtr.p;tick+=dtr.v;
      let st=d[p];if(st&0x80){ls=st;p++;}else st=ls;
      const ty=(st>>4)&0xf;
      if(ty===0x9){const n=d[p++],v=d[p++];if(v>0)notes.push({tick,note:n,vel:v});}
      else if(ty===0x8||ty===0xa||ty===0xb||ty===0xe){p+=2;}
      else if(ty===0xc||ty===0xd){p+=1;}
      else if(ty===0xf){
        if(st===0xff){const mt=d[p++];const lr=readVL(d,p);p=lr.p;
          if(mt===0x51&&lr.v===3)tempo=(d[p]<<16)|(d[p+1]<<8)|d[p+2];p+=lr.v;}
        else{const lr=readVL(d,p);p=lr.p;p+=lr.v;}
      }else p++;
      if(p>tend)break;
    }
    p=tend;
  }
  const spt=(tempo/1e6)/tpb;
  const n2t=m=>{const ns=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];return ns[m%12]+Math.floor(m/12-1);};
  return notes.map(n=>({time:n.tick*spt,note:n2t(n.note),vel:n.vel/127}));
}

async function initAudio() {
  if(audioReady)return;
  await Tone.start();
  synth=new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'triangle'},
    envelope:{attack:0.02,decay:0.1,sustain:0.4,release:0.3},
    volume:-4
  }).toDestination();
  const notes=parseMIDI(b64ToAB(MIDI_B64));
  const dur=notes.length?notes[notes.length-1].time+0.5:10;
  part=new Tone.Part((time,ev)=>{
    try{synth.triggerAttackRelease(ev.note,'8n',time,ev.vel);}catch(e){}
  },notes.map(e=>[e.time,e]));
  part.loop=true; part.loopEnd=dur; audioReady=true;
}
async function startAudio(){
  if(audioPlaying)return;
  try{await initAudio();Tone.Transport.start();part.start(0);audioPlaying=true;audioPill.classList.add('show');}catch(e){}
}
function stopAudio(){
  if(!audioPlaying)return;
  try{part&&part.stop();Tone.Transport.stop();Tone.Transport.position=0;}catch(e){}
  audioPlaying=false;audioPill.classList.remove('show');
}

// ── EFFECTS ───────────────────────────────────────────────────────────────────
const cColors=['#fbbf24','#f87171','#34d399','#60a5fa','#a78bfa','#fb923c','#f9a8d4'];
function spawnConfetti(x,y){
  for(let i=0;i<8;i++){
    const c=document.createElement('div');c.className='conf';
    const w=5+Math.random()*7,h=5+Math.random()*7;
    c.style.cssText=`left:${x+(Math.random()-.5)*60}px;top:${y}px;width:${w}px;height:${h}px;background:${cColors[Math.floor(Math.random()*cColors.length)]};animation-duration:${1.4+Math.random()}s;animation-delay:${Math.random()*0.25}s`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),2400);
  }
}
const nSyms=['♪','♫','♬','🎵','🎶'];
let lastNt=0;
function maybeNote(){
  const now=Date.now();if(now-lastNt<700)return;lastNt=now;
  const n=document.createElement('div');n.className='mnote';
  n.textContent=nSyms[Math.floor(Math.random()*nSyms.length)];
  n.style.left=(10+Math.random()*80)+'%';
  n.style.top=(window.innerHeight*0.48)+'px';
  document.body.appendChild(n);setTimeout(()=>n.remove(),1800);
}

// ── START ─────────────────────────────────────────────────────────────────────
// Position bride at left edge of screen to begin
baseX = 54; // bride fully visible at left
positionAll();
requestAnimationFrame(render);
</script>
</body>
</html>
